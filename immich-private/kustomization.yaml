apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: immich-private

resources:
  - library-pv.yaml
  - library-pvc.yaml
  - external-library-pv.yaml
  - external-library-pvc.yaml
  - sealed-db-owner-secret.yaml
  - postgres-cluster.yaml
  - install.yaml

# The upstream Immich Helm chart only renders the `library` volume, so the
# read-only external library is injected here. This survives any helm
# re-render of install.yaml.
patches:
  - path: patch-external-library.yaml
