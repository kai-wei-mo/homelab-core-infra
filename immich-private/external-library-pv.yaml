apiVersion: v1
kind: PersistentVolume
metadata:
  name: immich-private-external-library-pv
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  capacity:
    storage: 500Gi
  volumeMode: Filesystem
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /mnt/seagate/immich2
    type: Directory
