apiVersion: v1
kind: PersistentVolume
metadata:
  name: immich-private-library-pv
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /var/lib/immich2
    type: DirectoryOrCreate
