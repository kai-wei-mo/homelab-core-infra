---
# Source: audiobookshelf/templates/common.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiobookshelf
  labels:
    app.kubernetes.io/instance: audiobookshelf
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: audiobookshelf
    app.kubernetes.io/version: 2.32.1
    helm.sh/chart: audiobookshelf-2.0.1
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: audiobookshelf
      app.kubernetes.io/instance: audiobookshelf
  template:
    metadata:
      labels:
        app.kubernetes.io/name: audiobookshelf
        app.kubernetes.io/instance: audiobookshelf
    spec:
      
      serviceAccountName: default
      automountServiceAccountToken: true
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      containers:
        - name: audiobookshelf
          image: "ghcr.io/advplyr/audiobookshelf:2.32.1"
          imagePullPolicy: IfNotPresent
          env:
            - name: CONFIG_PATH
              value: /data/config
            - name: METADATA_PATH
              value: /data/metadata
            - name: TZ
              value: America/Chicago
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 0
            failureThreshold: 3
            timeoutSeconds: 1
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 0
            failureThreshold: 3
            timeoutSeconds: 1
            periodSeconds: 10
          startupProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 0
            failureThreshold: 30
            timeoutSeconds: 1
            periodSeconds: 5
      volumes:
        - name: data
          hostPath:
            path: /mnt/seagate/audiobookshelf
---
# Source: audiobookshelf/templates/common.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: audiobookshelf
  labels:
    app.kubernetes.io/instance: audiobookshelf
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: audiobookshelf
    app.kubernetes.io/version: 2.32.1
    helm.sh/chart: audiobookshelf-2.0.1
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - "audiobookshelf.kwm.local"
      secretName: "kwm-local-wildcard"
  rules:
    - host: "audiobookshelf.kwm.local"
      http:
        paths:
          - path: "/"
            pathType: Prefix
            backend:
              service:
                name: audiobookshelf
                port:
                  number: 80
    - host: "audiobookshelf.chaewon.io"
      http:
        paths:
          - path: "/"
            pathType: Prefix
            backend:
              service:
                name: audiobookshelf
                port:
                  number: 80
