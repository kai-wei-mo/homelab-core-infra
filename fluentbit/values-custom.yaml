# cr.fluentbit.io proxies Docker Hub and is flaky (CloudFront resets / rate limits).
# ghcr.io is the upstream source of truth for Fluent Bit images.
image:
  repository: ghcr.io/fluent/fluent-bit

tolerations:
  - operator: Exists

serviceMonitor:
  enabled: true

dashboards:
  enabled: true
  namespace: monitoring

# Journal + /dev/kmsg need host access beyond the chart defaults
securityContext:
  privileged: true

env:
  - name: NODE_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName

# Raise host inotify limits before tail starts (fs.inotify is not namespaced)
initContainers:
  - name: raise-inotify-limits
    image: busybox:1.36
    securityContext:
      privileged: true
    command:
      - sh
      - -c
      - |
        echo 8192 > /mnt/host-proc-sys/fs/inotify/max_user_instances
        echo 524288 > /mnt/host-proc-sys/fs/inotify/max_user_watches
        echo "max_user_instances=$(cat /mnt/host-proc-sys/fs/inotify/max_user_instances)"
        echo "max_user_watches=$(cat /mnt/host-proc-sys/fs/inotify/max_user_watches)"
    volumeMounts:
      - name: host-proc-sys
        mountPath: /mnt/host-proc-sys

extraVolumes:
  - name: host-proc-sys
    hostPath:
      path: /proc/sys
  - name: varlogjournal
    hostPath:
      path: /var/log/journal
  - name: runlogjournal
    hostPath:
      path: /run/log/journal
  - name: systemdjournalsocket
    hostPath:
      path: /run/systemd/journal
  - name: devkmsg
    hostPath:
      path: /dev/kmsg

extraVolumeMounts:
  - name: varlogjournal
    mountPath: /var/log/journal
    readOnly: true
  - name: runlogjournal
    mountPath: /run/log/journal
    readOnly: true
  - name: systemdjournalsocket
    mountPath: /run/systemd/journal
    readOnly: true
  - name: devkmsg
    mountPath: /dev/kmsg
    readOnly: true

args:
  - --workdir=/fluent-bit/etc
  - --config=/fluent-bit/etc/conf/fluent-bit.yaml

config:
  service: ""
  inputs: ""
  filters: ""
  outputs: ""
