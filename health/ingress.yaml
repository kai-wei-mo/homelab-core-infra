apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: healthcheck
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  rules:
    - host: health.chaewon.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: healthcheck
                port:
                  number: 80
    - host: health.kwm.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: healthcheck
                port:
                  number: 80

  tls:
    - secretName: kwm-local-wildcard
      hosts:
        - health.kwm.local
