apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrentvpn
  labels:
    app.kubernetes.io/name: qbittorrentvpn
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: qbittorrentvpn
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qbittorrentvpn
    spec:
      securityContext:
        fsGroup: 0
      initContainers:
        # Secret subPath mounts are read-only and break dos2unix in the image; copy onto hostPath first.
        - name: wireguard-config
          image: docker.io/busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /config/wireguard
              cp /wireguard-secret/wg0.conf /config/wireguard/wg0.conf
              chmod 600 /config/wireguard/wg0.conf
          volumeMounts:
            - name: config
              mountPath: /config
            - name: wireguard
              mountPath: /wireguard-secret
              readOnly: true
      containers:
        - name: qbittorrentvpn
          image: docker.io/dyonr/qbittorrentvpn:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          env:
            - name: VPN_ENABLED
              value: "yes"
            - name: VPN_TYPE
              value: wireguard
            - name: LAN_NETWORK
              valueFrom:
                configMapKeyRef:
                  name: qbittorrentvpn
                  key: LAN_NETWORK
            - name: NAME_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: qbittorrentvpn
                  key: NAME_SERVERS
            - name: ENABLE_SSL
              value: "no"
            - name: PUID
              value: "0"
            - name: PGID
              value: "0"
            - name: TZ
              value: UTC
            # start.sh pings immediately; WireGuard/iptables may not be ready yet. Default RESTART_CONTAINER=yes then exit(1) loops the pod.
            - name: HEALTH_CHECK_HOST
              value: "1.1.1.1"
            - name: HEALTH_CHECK_INTERVAL
              value: "60"
            - name: HEALTH_CHECK_AMOUNT
              value: "5"
            - name: RESTART_CONTAINER
              value: "no"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: bt-tcp
              containerPort: 8999
              protocol: TCP
            - name: bt-udp
              containerPort: 8999
              protocol: UDP
          volumeMounts:
            - name: config
              mountPath: /config
            # Image start.sh expects /downloads; sibling to qBittorrent/ on disk (DirectoryOrCreate, does not touch existing profile).
            - name: downloads
              mountPath: /downloads
            # Same host paths as helm qbittorrent — add /movies and /tv as save locations or categories in the WebUI.
            - name: movies
              mountPath: /movies
            - name: tv
              mountPath: /tv
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        # Same tree as helm qbittorrent (/config → .qbittorrent/qBittorrent/...). Init only adds/updates wireguard/wg0.conf from the Secret.
        - name: config
          hostPath:
            path: /mnt/seagate/jellyfin/.qbittorrent
            type: Directory
        - name: wireguard
          secret:
            secretName: qbittorrentvpn-wireguard
        - name: downloads
          hostPath:
            path: /mnt/seagate/jellyfin/.qbittorrent/downloads
            type: DirectoryOrCreate
        - name: movies
          hostPath:
            path: /mnt/seagate/jellyfin/movies
            type: Directory
        - name: tv
          hostPath:
            path: /mnt/seagate/jellyfin/tv
            type: Directory
