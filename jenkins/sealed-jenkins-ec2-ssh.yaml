# EC2 plugin requires classic PEM (BEGIN RSA PRIVATE KEY), not OpenSSH format;
# convert with: ssh-keygen -p -m PEM -f <key> -N ""
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: jenkins-ec2-ssh
  namespace: jenkins
spec:
  encryptedData:
    ssh-private-key: 
  template:
    metadata:
      name: jenkins-ec2-ssh
      namespace: jenkins
