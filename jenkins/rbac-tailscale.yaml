# Tailscale sidecar needs to persist node state in a Kubernetes Secret
# (TS_KUBE_SECRET) and optionally write Pod Events for debugging.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins-tailscale
  namespace: jenkins
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["jenkins-tailscale-state"]
    verbs: ["get", "update", "patch"]
  # create cannot be scoped by resourceNames
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-tailscale
  namespace: jenkins
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jenkins-tailscale
subjects:
  - kind: ServiceAccount
    name: jenkins
    namespace: jenkins
