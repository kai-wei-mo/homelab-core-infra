controller:
  serviceType: ClusterIP

  admin:
    # createSecret must stay true so the chart mounts the secret as
    # chart-admin-username/password for JCasC; existingSecret skips creating one.
    createSecret: true
    existingSecret: jenkins-admin

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    path: /
    pathType: Prefix
    hostName: jenkins.home.chaewon.io
    tls:
      - secretName: home-chaewon-io-wildcard
        hosts:
          - jenkins.home.chaewon.io

  # The k8s node is already on the tailnet with --accept-routes
  # so pod egress to EC2 private IPs uses the host routes.
  # This sidecar would only be needed if this were not the case.

  # sidecars:
  #   additionalSidecarContainers:
  #     - name: tailscale
  #       image: tailscale/tailscale:stable
  #       env:
  #         - name: TS_AUTHKEY
  #           valueFrom:
  #             secretKeyRef:
  #               name: jenkins-tailscale
  #               key: auth-key
  #         - name: TS_KUBE_SECRET
  #           value: jenkins-tailscale-state
  #         - name: TS_HOSTNAME
  #           value: jenkins-controller
  #         - name: TS_EXTRA_ARGS
  #           value: --accept-routes
  #         - name: TS_USERSPACE
  #           value: "false"
  #         - name: POD_NAME
  #           valueFrom:
  #             fieldRef:
  #               fieldPath: metadata.name
  #         - name: POD_UID
  #           valueFrom:
  #             fieldRef:
  #               fieldPath: metadata.uid
  #       securityContext:
  #         privileged: true
  #         runAsUser: 0
  #         runAsNonRoot: false

  additionalExistingSecrets:
    - name: jenkins-aws
      keyName: access-key-id
    - name: jenkins-aws
      keyName: secret-access-key
    - name: jenkins-ec2-ssh
      keyName: ssh-private-key
    - name: jenkins-tailscale
      keyName: auth-key

  JCasC:
    defaultConfig: true
    configScripts:
      ec2-agents: |
        credentials:
          system:
            domainCredentials:
              - credentials:
                  - aws:
                      scope: GLOBAL
                      id: "aws-ec2"
                      description: "AWS credentials for EC2 agents"
                      accessKey: "${jenkins-aws-access-key-id}"
                      secretKey: "${jenkins-aws-secret-access-key}"
                  - basicSSHUserPrivateKey:
                      scope: GLOBAL
                      id: "ec2-ssh"
                      description: "SSH key for EC2 agents"
                      username: "ubuntu"
                      privateKeySource:
                        directEntry:
                          privateKey: "${jenkins-ec2-ssh-ssh-private-key}"
        jenkins:
          clouds:
            - kubernetes:
                containerCapStr: "10"
                defaultsProviderTemplate: ""
                connectTimeout: "5"
                readTimeout: "15"
                jenkinsUrl: "http://jenkins.jenkins.svc.cluster.local:8080"
                jenkinsTunnel: "jenkins-agent.jenkins.svc.cluster.local:50000"
                skipTlsVerify: false
                usageRestricted: false
                maxRequestsPerHostStr: "32"
                retentionTimeout: "5"
                waitForPodSec: "600"
                name: "kubernetes"
                namespace: "jenkins"
                restrictedPssSecurityContext: false
                serverUrl: "https://kubernetes.default"
                addMasterProxyEnvVars: false
                credentialsId: ""
                podLabels:
                  - key: "jenkins/jenkins-jenkins-agent"
                    value: "true"
                templates:
                  - name: "default"
                    namespace: "jenkins"
                    containers:
                      - name: "jnlp"
                        alwaysPullImage: false
                        args: "^${computer.jnlpmac} ^${computer.name}"
                        envVars:
                          - envVar:
                              key: "JENKINS_URL"
                              value: "http://jenkins.jenkins.svc.cluster.local:8080/"
                        image: "jenkins/inbound-agent:3383.vc8881d4b_0e76-1"
                        privileged: "false"
                        resourceLimitCpu: 512m
                        resourceLimitMemory: 512Mi
                        resourceRequestCpu: 512m
                        resourceRequestMemory: 512Mi
                        ttyEnabled: false
                        workingDir: /home/jenkins/agent
                    idleMinutes: 0
                    instanceCap: 2147483647
                    label: "jenkins-jenkins-agent "
                    nodeUsageMode: "NORMAL"
                    podRetention: Never
                    showRawYaml: true
                    serviceAccount: "default"
                    slaveConnectTimeoutStr: "100"
                    yamlMergeStrategy: override
                    inheritYamlMergeStrategy: false
            - amazonEC2:
                name: "ec2-us-east-1"
                credentialsId: "aws-ec2"
                region: "us-east-1"
                sshKeysCredentialsId: "ec2-ssh"
                instanceCapStr: "5"
                noDelayProvisioning: true
                templates:
                  - description: "EC2 Connectivity smoke-test (not for builds)"
                    labelString: "litmus"
                    mode: NORMAL
                    ami: "ami-0a02a779008fa3b99"
                    amiType:
                      unixData:
                        sshPort: "22"
                    type: T3Medium
                    remoteAdmin: "ubuntu"
                    remoteFS: "/home/ubuntu"
                    numExecutors: 1
                    securityGroups: "sg-05cc549f72ba7952c"
                    subnetId: "subnet-079e10bc60a5f3a09"
                    iamInstanceProfile: "arn:aws:iam::483469416043:instance-profile/jenkins-agent"
                    associateIPStrategy: PRIVATE_IP
                    connectBySSHProcess: false
                    connectionStrategy: PRIVATE_IP
                    useEphemeralDevices: true
                    idleTerminationMinutes: "30"
                    deleteRootOnTermination: true
                    stopOnTerminate: false
                    maxTotalUses: -1
                    # ^${...} escapes shell vars from JCasC secret substitution;
                    # ${jenkins-tailscale-auth-key} is intentionally substituted.
                    userData: |
                      #!/bin/bash
                      set -euo pipefail
                      export DEBIAN_FRONTEND=noninteractive
                      apt-get update -qq
                      apt-get install -y -qq curl
                      curl -fsSL https://tailscale.com/install.sh | sh
                      INSTANCE_ID=$(curl -fsSL http://169.254.169.254/latest/meta-data/instance-id || echo unknown)
                      MAC=$(curl -fsSL http://169.254.169.254/latest/meta-data/network/interfaces/macs/ | head -1)
                      VPC_CIDR=$(curl -fsSL "http://169.254.169.254/latest/meta-data/network/interfaces/macs/^${MAC}vpc-ipv4-cidr-block")
                      tailscale up --authkey='${jenkins-tailscale-auth-key}' --hostname="jenkins-agent-^${INSTANCE_ID}" --advertise-routes="^${VPC_CIDR}" --accept-routes
                    initScript: |
                      #!/bin/bash
                      set -euo pipefail
                      for i in $(seq 1 60); do
                        if command -v tailscale >/dev/null 2>&1 && tailscale status >/dev/null 2>&1; then
                          date
                          echo hello world
                          exit 0
                        fi
                        sleep 5
                      done
                      echo "tailscale did not become ready in time" >&2
                      exit 1
      litmus-job: |
        jobs:
          - script: |
              pipelineJob('litmus') {
                description('Smoke test for the litmus EC2 agent')
                definition {
                  cps {
                    script('''pipeline {
                      agent { label 'litmus' }
                      stages {
                        stage('Echo') {
                          steps {
                            sh 'date'
                            sh 'echo hello world'
                          }
                        }
                      }
                    }''')
                    sandbox()
                  }
                }
              }

agent:
  enabled: true

persistence:
  enabled: true
  size: 20Gi
