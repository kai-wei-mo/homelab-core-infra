## S3 API, data on disk

fullnameOverride: minio

mode: standalone

# Bitnami moved versioned images off docker.io/bitnami → bitnamilegacy
image:
  repository: bitnamilegacy/minio

console:
  enabled: true
  image:
    repository: bitnamilegacy/minio-object-browser

auth:
  rootUser: minio
  rootPassword: minio-homelab   # OK for private network

defaultBuckets: "chunks,ruler"

persistence:
  enabled: true
  size: 10Gi

service:
  type: ClusterIP
  ports:
    api: 9000
