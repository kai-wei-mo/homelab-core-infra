deploymentMode: Monolithic

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: s3
    bucketNames:
      chunks: chunks
      ruler: ruler
    s3:
      endpoint: minio.minio.svc.cluster.local:9000
      accessKeyId: minio
      secretAccessKey: minio-homelab
      s3ForcePathStyle: true
      insecure: true
  limits_config:
    reject_old_samples: true
    reject_old_samples_max_age: 336h
    retention_period: 336h
    allow_structured_metadata: true
    volume_enabled: true
  compactor:
    retention_enabled: true
    delete_request_store: s3
  pattern_ingester:
    enabled: true
  rulerConfig:
    enable_api: true
    storage:
      type: local

minio:
  enabled: false

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 2Gi

# Zero out other deployment modes
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomPlanner:
  replicas: 0
bloomBuilder:
  replicas: 0
bloomGateway:
  replicas: 0

# Homelab: skip multi-GB memcached sidecars
chunksCache:
  enabled: false
resultsCache:
  enabled: false

monitoring:
  serviceMonitor:
    enabled: true
  dashboards:
    enabled: false
  rules:
    enabled: false
  alerts:
    enabled: false
