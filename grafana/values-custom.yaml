adminUser: admin
adminPassword: admin   # OK for private network

service:
  type: ClusterIP

ingress:
  enabled: true
  ingressClassName: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
  path: /
  pathType: Prefix
  hosts:
    - grafana.home.chaewon.io
  tls:
    - secretName: home-chaewon-io-wildcard
      hosts:
        - grafana.home.chaewon.io

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
        access: proxy
        isDefault: true
      - name: Loki
        type: loki
        url: http://loki-gateway.logging.svc.cluster.local
        access: proxy

# Pick up ConfigMaps labeled grafana_dashboard (Fluent Bit, grafana-dashboards, etc.)
sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"
    searchNamespace: monitoring
